name: bump & release

on:
  push:
    branches:
      - main

jobs:
  release-on-push:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.OSHEPHERD_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.OSHEPHERD_TOKEN }}

      - id: release
        uses: rymndhng/release-on-push-action@master
        with:
          bump_version_scheme: patch
          max_commits: 250
          prerelease: true

      - name: bump version in package files
        if: steps.release.outputs.version != ''
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.release.outputs.version }}\"/" pyproject.toml
          sed -i "s/    version=.*/    version=\"${{ steps.release.outputs.version }}\",/" setup.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml setup.py
          git commit -m "chore: bump version to ${{ steps.release.outputs.version }} [skip ci]"
          git push
